<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Job Search IR System{% endblock %}</title>
  <meta name="description" content="{% block description %}Search job postings using TF-IDF and BM25 information retrieval methods.{% endblock %}" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
          colors: {
            brand: {
              50:  '#f0f7ff',
              100: '#e0effe',
              200: '#b9dffd',
              300: '#7cc4fc',
              400: '#38a5f8',
              500: '#0e87e9',
              600: '#0269c7',
              700: '#0353a2',
              800: '#074685',
              900: '#0b3b6e',
            }
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Inter', ui-sans-serif, system-ui; }
    .fade-in { animation: fadeIn .35s ease both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    /* thin scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>

  {% block head %}{% endblock %}
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 text-brand-700 font-semibold text-base tracking-tight">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        JobSearch IR
      </a>
      <div class="flex items-center gap-5 text-sm text-gray-500 font-medium">
        <a href="/" class="hover:text-brand-600 transition-colors">Search</a>
        <a href="#about" class="hover:text-brand-600 transition-colors">About</a>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="flex-1">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-200 bg-white mt-16">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col sm:flex-row items-center justify-between gap-3 text-sm text-gray-400">
      <span>© 2024 Job Search IR System &mdash; Information Retrieval Project</span>
      <span class="flex items-center gap-2">
        <span class="inline-flex items-center gap-1 bg-gray-100 text-gray-500 px-2 py-0.5 rounded text-xs font-medium">TF-IDF</span>
        <span class="inline-flex items-center gap-1 bg-gray-100 text-gray-500 px-2 py-0.5 rounded text-xs font-medium">BM25</span>
      </span>
    </div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
